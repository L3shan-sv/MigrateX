version: "3.9"

# ── MigrateX — Full Stack Docker Compose ────────────────────────────────────
#
# Services:
#   source          MySQL 8.0 (edge — authoritative write target)
#   target          MySQL 8.0 (cloud — migration destination)
#   zookeeper       Kafka dependency
#   kafka           CDC event log (1 broker in dev, 3 in prod)
#   schema-registry Avro schema evolution
#   kafka-connect   Debezium MySQL connector host
#   etcd0/1/2       Distributed lease fencing (3-node Raft cluster)
#   prometheus      Metrics collection
#   grafana         Dashboards (localhost:3000 admin/migratex)
#   phase1          Discovery & Risk Profiling
#   phase2          Infrastructure Provisioning
#   phase3          Chaos Validation
#   phase4          Dark Launch & Semantic Audit
#   phase5          Event Horizon & Cutover
#   phase6          Post-Migration Hardening
#
# Quick start:
#   docker compose up -d source target             # DBs only
#   docker compose up -d                           # full stack
#   docker compose up -d source target kafka etcd0 etcd1 etcd2  # phase 2 deps
#
# Credentials:
#   MySQL root: rootpassword
#   MySQL app:  see SOURCE_*/TARGET_* env vars
#   Grafana:    admin / migratex

networks:
  migratex:
    driver: bridge

volumes:
  source_data:
  target_data:
  kafka_data:
  zookeeper_data:
  etcd0_data:
  etcd1_data:
  etcd2_data:
  prometheus_data:
  grafana_data:
  phase1_artifacts:
  phase2_artifacts:
  phase3_artifacts:
  phase4_artifacts:
  phase5_artifacts:
  phase6_artifacts:

# ── Shared environment ────────────────────────────────────────────────────────
x-source-env: &source-env
  SOURCE_HOST: source
  SOURCE_PORT: "3306"
  SOURCE_USER: migratex_reader
  SOURCE_PASSWORD: migratex_reader_pass
  SOURCE_DATABASE: airbnb_prod

x-target-env: &target-env
  TARGET_HOST: target
  TARGET_PORT: "3306"
  TARGET_USER: migratex_writer
  TARGET_PASSWORD: migratex_writer_pass
  TARGET_DATABASE: airbnb_prod

x-kafka-env: &kafka-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KAFKA_TOPIC_PREFIX: migratex

x-etcd-env: &etcd-env
  ETCD_ENDPOINTS: etcd0:2379,etcd1:2379,etcd2:2379
  ETCD_LEASE_TTL_SECONDS: "10"

x-ponr-env: &ponr-env
  PONR_SIMULATIONS: "10000"
  PONR_SLA_THRESHOLD_USD: "5000.0"
  ANOMALY_ALERT_THRESHOLD: "0.7"

services:

  # ── Source MySQL (edge — on-premise simulation) ───────────────────────────
  source:
    image: mysql:8.0
    container_name: migratex-source
    networks: [migratex]
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: airbnb_prod
      MYSQL_USER: migratex_reader
      MYSQL_PASSWORD: migratex_reader_pass
    volumes:
      - source_data:/var/lib/mysql
      - ./docker/mysql/source.cnf:/etc/mysql/conf.d/migratex.cnf:ro
      - ./docker/mysql/init-source.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-row-image=FULL
      --expire-logs-days=7
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --performance-schema=ON
      --read-only=OFF
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Target MySQL (cloud simulation) ──────────────────────────────────────
  target:
    image: mysql:8.0
    container_name: migratex-target
    networks: [migratex]
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: airbnb_prod
      MYSQL_USER: migratex_writer
      MYSQL_PASSWORD: migratex_writer_pass
    volumes:
      - target_data:/var/lib/mysql
      - ./docker/mysql/target.cnf:/etc/mysql/conf.d/migratex.cnf:ro
    command: >
      --server-id=2
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --performance-schema=ON
      --read-only=OFF
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Zookeeper ─────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: migratex-zookeeper
    networks: [migratex]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: migratex-kafka
    networks: [migratex]
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_LOGGERS: "kafka=WARN,kafka.controller=WARN,kafka.log.LogCleaner=WARN,state.change.logger=WARN,kafka.producer.async.DefaultEventHandler=WARN"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Schema Registry ───────────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: migratex-schema-registry
    networks: [migratex]
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Kafka Connect + Debezium ──────────────────────────────────────────────
  kafka-connect:
    image: debezium/connect:2.6
    container_name: migratex-kafka-connect
    networks: [migratex]
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      source:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: migratex-connect-group
      CONFIG_STORAGE_TOPIC: migratex-connect-configs
      OFFSET_STORAGE_TOPIC: migratex-connect-offsets
      STATUS_STORAGE_TOPIC: migratex-connect-status
      CONNECT_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      LOG_LEVEL: WARN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── etcd node 0 (AZ-1) ───────────────────────────────────────────────────
  etcd0:
    image: bitnami/etcd:3.5
    container_name: migratex-etcd0
    networks: [migratex]
    ports:
      - "2379:2379"
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_NAME: etcd0
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd0:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd0:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_INITIAL_CLUSTER: etcd0=http://etcd0:2380,etcd1=http://etcd1:2380,etcd2=http://etcd2:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: migratex-cluster
      ETCD_LOG_LEVEL: warn
    volumes:
      - etcd0_data:/bitnami/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── etcd node 1 (AZ-2) ───────────────────────────────────────────────────
  etcd1:
    image: bitnami/etcd:3.5
    container_name: migratex-etcd1
    networks: [migratex]
    ports:
      - "2381:2379"
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_NAME: etcd1
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd1:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd1:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_INITIAL_CLUSTER: etcd0=http://etcd0:2380,etcd1=http://etcd1:2380,etcd2=http://etcd2:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: migratex-cluster
      ETCD_LOG_LEVEL: warn
    volumes:
      - etcd1_data:/bitnami/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── etcd node 2 (AZ-3) ───────────────────────────────────────────────────
  etcd2:
    image: bitnami/etcd:3.5
    container_name: migratex-etcd2
    networks: [migratex]
    ports:
      - "2383:2379"
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_NAME: etcd2
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd2:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd2:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_INITIAL_CLUSTER: etcd0=http://etcd0:2380,etcd1=http://etcd1:2380,etcd2=http://etcd2:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: migratex-cluster
      ETCD_LOG_LEVEL: warn
    volumes:
      - etcd2_data:/bitnami/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: migratex-prometheus
    networks: [migratex]
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--log.level=warn"
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O", "-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: migratex-grafana
    networks: [migratex]
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: migratex
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_LEVEL: warn
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Phase 1: Discovery ────────────────────────────────────────────────────
  phase1:
    build:
      context: ./phase1-discovery
      dockerfile: Dockerfile
    container_name: migratex-phase1
    networks: [migratex]
    depends_on:
      source:
        condition: service_healthy
    environment:
      <<: [*source-env, *target-env, *ponr-env]
      OUTPUT_DIR: /app/artifacts
      LOG_LEVEL: INFO
    volumes:
      - phase1_artifacts:/app/artifacts
    command: python main.py run --ponr-data-gb 100 --ponr-write-mbps 50 --ponr-network-gbps 1.0
    profiles: [phase1, all]

  # ── Phase 2: Infrastructure ───────────────────────────────────────────────
  phase2:
    build:
      context: ./phase2-infrastructure
      dockerfile: Dockerfile
    container_name: migratex-phase2
    networks: [migratex]
    depends_on:
      source:
        condition: service_healthy
      target:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy
      etcd0:
        condition: service_healthy
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
    environment:
      <<: [*source-env, *target-env, *kafka-env, *etcd-env, *ponr-env]
      KAFKA_CONNECT_URL: http://kafka-connect:8083
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_PARTITIONS: "12"
      KAFKA_REPLICATION_FACTOR: "1"
      PROMETHEUS_PORT: "8000"
      LOG_LEVEL: INFO
    volumes:
      - phase1_artifacts:/app/phase1_artifacts:ro
      - phase2_artifacts:/app/artifacts
    ports:
      - "8002:8000"
    command: python main.py provision --skip-binlog
    profiles: [phase2, all]

  # ── Phase 3: Chaos ────────────────────────────────────────────────────────
  phase3:
    build:
      context: ./phase3-chaos
      dockerfile: Dockerfile
    container_name: migratex-phase3
    networks: [migratex]
    depends_on:
      source:
        condition: service_healthy
      target:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: [*source-env, *target-env, *kafka-env, *etcd-env, *ponr-env]
      CHAOS_BLAST_RADIUS: shadow
      CHAOS_MAX_FAULT_DURATION_SECONDS: "600"
      REPLAY_MULTIPLIER: "5.0"
      RESILIENCE_PASS_THRESHOLD: "95"
      PROMETHEUS_PORT: "8000"
      LOG_LEVEL: INFO
    volumes:
      - phase2_artifacts:/app/phase2_artifacts:ro
      - phase3_artifacts:/app/artifacts
    ports:
      - "8003:8000"
    command: python main.py run --skip-replay
    profiles: [phase3, all]

  # ── Phase 4: Dark Launch ──────────────────────────────────────────────────
  phase4:
    build:
      context: ./phase4-dark-launch
      dockerfile: Dockerfile
    container_name: migratex-phase4
    networks: [migratex]
    depends_on:
      source:
        condition: service_healthy
      target:
        condition: service_healthy
    environment:
      <<: [*source-env, *target-env, *ponr-env]
      AUDIT_OBSERVATION_WINDOW_HOURS: "72"
      SHADOW_WRITE_TIMEOUT_MS: "500"
      EGRESS_BASELINE_PRICE_PER_GB: "0.09"
      WAL_BUFFER_MAX_AGE_HOURS: "2"
      PII_SURFACE_MAP_PATH: /app/phase1_artifacts/pii_surface_map.json
      FK_GRAPH_PATH: /app/phase1_artifacts/fk_dependency_graph.json
      LOG_LEVEL: INFO
    volumes:
      - phase1_artifacts:/app/phase1_artifacts:ro
      - phase4_artifacts:/app/artifacts
    ports:
      - "8004:8000"
    command: python main.py run
    profiles: [phase4, all]

  # ── Phase 5: Cutover ──────────────────────────────────────────────────────
  phase5:
    build:
      context: ./phase5-cutover
      dockerfile: Dockerfile
    container_name: migratex-phase5
    networks: [migratex]
    depends_on:
      source:
        condition: service_healthy
      target:
        condition: service_healthy
      etcd0:
        condition: service_healthy
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
    environment:
      <<: [*source-env, *target-env, *etcd-env, *ponr-env]
      PREFLIGHT_REPLICATION_LAG_MAX: "5.0"
      PREFLIGHT_ANOMALY_SCORE_MAX: "0.7"
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_MINUTES: "25"
      FINAL_CALL_WINDOW_MINUTES: "25"
      LOG_LEVEL: INFO
    volumes:
      - phase4_artifacts:/app/phase4_artifacts:ro
      - phase5_artifacts:/app/artifacts
    ports:
      - "8005:8000"
    command: python main.py preflight
    profiles: [phase5, all]

  # ── Phase 6: Hardening ────────────────────────────────────────────────────
  phase6:
    build:
      context: ./phase6-hardening
      dockerfile: Dockerfile
    container_name: migratex-phase6
    networks: [migratex]
    depends_on:
      source:
        condition: service_healthy
      target:
        condition: service_healthy
    environment:
      <<: [*source-env, *target-env]
      DECOMMISSION_WINDOW_DAYS: "10"
      DECOMMISSION_DELETION_LOCK: "true"
      RETRAINING_BASELINE_DAYS: "14"
      MODEL_OUTPUT_DIR: /app/artifacts/model
      REPORT_OUTPUT_DIR: /app/artifacts/reports
      RUNBOOK_OUTPUT_DIR: /app/artifacts/runbooks
      PHASE1_PONR_ESTIMATE_PATH: /app/phase1_artifacts/ponr_phase1_estimate.json
      PHASE3_RESILIENCE_REPORT_PATH: /app/phase3_artifacts/resilience_report.json
      LOG_LEVEL: INFO
    volumes:
      - phase1_artifacts:/app/phase1_artifacts:ro
      - phase3_artifacts:/app/phase3_artifacts:ro
      - phase5_artifacts:/app/phase5_artifacts:ro
      - phase6_artifacts:/app/artifacts
    ports:
      - "8006:8000"
    command: python main.py run
    profiles: [phase6, all]
